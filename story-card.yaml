acceptance_criteria:
- description: POST /auth/login accepts { email, password }
  id: ac1
  implementation_hint: Create a FastAPI endpoint that validates JSON request body
    contains email and password fields.
  test_hint: Send POST requests with valid and invalid JSON payloads to verify request
    parsing.
- description: Returns 200 with JWT token on valid credentials
  id: ac2
  implementation_hint: Query database for user by email, verify password with bcrypt,
    generate JWT token with 24-hour expiration.
  test_hint: Mock database lookup and verify JWT token is returned with correct payload
    and expiration timestamp.
- description: Returns 401 on invalid credentials
  id: ac3
  implementation_hint: Return 401 Unauthorized response when email not found or bcrypt
    password verification fails.
  test_hint: Test with non-existent email and incorrect password combinations to confirm
    401 responses.
- description: JWT expires in 24 hours
  id: ac4
  implementation_hint: Set JWT exp claim to current time plus 86400 seconds using
    PyJWT library.
  test_hint: Decode JWT token and verify exp timestamp is exactly 24 hours from issue
    time.
- description: Rate limited to 5 attempts per minute per IP
  id: ac5
  implementation_hint: Implement middleware using slowapi library to track login attempts
    by client IP address.
  test_hint: Send 6 consecutive requests from same IP within 60 seconds and verify
    6th request is rate-limited.
