acceptance_criteria:
- description: POST /auth/login accepts { email, password }
  id: ac1
  implementation_hint: Create a FastAPI POST endpoint that validates JSON payload
    contains email and password fields.
  test_hint: Send POST request with valid JSON payload and verify endpoint accepts
    the parameters without error.
- description: Returns 200 with JWT token on valid credentials
  id: ac2
  implementation_hint: Query database for user by email, verify password hash with
    bcrypt, generate JWT token with HS256 algorithm and return in response body.
  test_hint: Test with valid email and password combination and assert response code
    200 with valid JWT token in response.
- description: Returns 401 on invalid credentials
  id: ac3
  implementation_hint: Return 401 Unauthorized status when email not found or bcrypt
    password verification fails.
  test_hint: Test with incorrect password and non-existent email, verify 401 status
    code is returned.
- description: JWT expires in 24 hours
  id: ac4
  implementation_hint: Set JWT exp claim to current time plus 86400 seconds when generating
    token.
  test_hint: Decode JWT and verify exp claim equals current timestamp plus 24 hours.
- description: Rate limited to 5 attempts per minute per IP
  id: ac5
  implementation_hint: Implement rate limiting middleware that tracks login attempts
    per IP address using in-memory store or Redis.
  test_hint: Send 6 requests from same IP within one minute and verify 6th request
    returns 429 Too Many Requests.
